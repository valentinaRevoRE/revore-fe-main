<div class="access-denied">
  <div class="access-denied__card">

    <div class="access-denied__icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <h1 class="access-denied__title">Acceso restringido</h1>

    <p class="access-denied__body">
      Esta herramienta es exclusiva para el equipo de RevoRE.<br>
      Tu cuenta no tiene permisos para acceder.
    </p>

    <button class="access-denied__btn" type="button" (click)="goToLogin()">
      Volver al login
    </button>

  </div>
</div>
